<!DOCTYPE html>
<html>
<head>
<title>Food World</title>

<style>

body{
font-family: Arial;
background:#fff8f0;
text-align:center;
margin:0;
}

header{
background:#ff7043;
color:white;
padding:20px;
font-size:30px;
}

.searchbox{
margin:20px;
}

input{
padding:10px;
width:250px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px;
background:#ff7043;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.food{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0px 0px 10px lightgray;
width:200px;
cursor:pointer;
}

.food img{
width:180px;
height:120px;
border-radius:10px;
}

.food:hover{
transform:scale(1.05);
}

footer{
margin-top:40px;
background:#333;
color:white;
padding:10px;
}

</style>

<script>

function openCuisine(name){
alert("Welcome to " + name + " Cuisine Section");
}

function searchFood(){
var x=document.getElementById("search").value;
alert("Searching for: "+x);
}

</script>

</head>

<body>

<header>
🌍 Food World
</header>

<div class="searchbox">
<input type="text" id="search" placeholder="Search cuisines or dishes">
<button onclick="searchFood()">Search</button>
</div>

<h2>Explore Cuisines Around the World</h2>

<div class="container">

<div class="food" onclick="openCuisine('Indian')">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Indian_thali.jpg">
<h3>Indian</h3>
</div>

<div class="food" onclick="openCuisine('Italian')">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg">
<h3>Italian</h3>
</div>

<div class="food" onclick="openCuisine('Continental')">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/39/Chicken_steak.jpg">
<h3>Continental</h3>
</div>

</div>

<footer>
© 2026 Food World
</footer>

</body>
</html>
