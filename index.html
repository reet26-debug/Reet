<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration Form</title>
</head>

<body>

    <h2>Patient Registration Form</h2>

    <form>

        <label for="name">Patient Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" rows="3" cols="30"></textarea><br><br>

        <label for="category">Consultation Category:</label><br>
        <select id="category">
            <option>General Medicine</option>
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Orthopedics</option>
            
        </select><br><br>

        <label>Existing Medical Conditions:</label><br>
        <input type="checkbox"> Diabetes<br>
        <input type="checkbox"> Hypertension<br>
        <input type="checkbox"> Thyroid<br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age"><br><br>

        <label for="height">Height (cm):</label><br>
        <input type="number" id="height"><br><br>

        <label for="weight">Weight (kg):</label><br>
        <input type="number" id="weight"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
